version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: task-flow-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - task-flow-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-flow-app
    environment:
      APP_NAME: "Task Flow"
      APP_ENV: local
      APP_KEY: "${APP_KEY}"
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_LOCALE: en
      APP_FALLBACK_LOCALE: en
      APP_FAKER_LOCALE: en_US
      BCRYPT_ROUNDS: 12
      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_DEPRECATIONS_CHANNEL: null
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-task_flow}"
      DB_USERNAME: "${DB_USERNAME:-task_flow}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      SESSION_DRIVER: database
      SESSION_LIFETIME: 120
      SESSION_ENCRYPT: "false"
      SESSION_PATH: /
      SESSION_DOMAIN: null
      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MEMCACHED_HOST: 127.0.0.1
      REDIS_CLIENT: phpredis
      REDIS_HOST: 127.0.0.1
      REDIS_PASSWORD: null
      REDIS_PORT: 6379
      MAIL_MAILER: log
      MAIL_SCHEME: null
      MAIL_HOST: 127.0.0.1
      MAIL_PORT: 2525
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_FROM_ADDRESS: "hello@example.com"
      MAIL_FROM_NAME: "${APP_NAME}"
      VITE_APP_NAME: "${APP_NAME}"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      - mysql
    networks:
      - task-flow-network
    command: >
      sh -c "
        if [ ! -f .env ]; then cp .env.example .env; fi &&
        if [ -z \$$APP_KEY ]; then php artisan key:generate; fi &&
        echo 'Waiting for MySQL to be ready...' &&
        while ! nc -z mysql 3306; do sleep 1; done &&
        echo 'MySQL is ready!' &&
        php artisan migrate --force &&
        php-fpm
      "

  mysql:
    image: mysql:8.0
    container_name: task-flow-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: "${DB_DATABASE:-task_flow}"
      MYSQL_USER: "${DB_USERNAME:-task_flow}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - task-flow-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:

networks:
  task-flow-network:
    driver: bridge
